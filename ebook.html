<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editorial Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  width:100%;
  height:100vh;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #f5f1eb 0%,
    #ebe4d8 100%
  );

  display:flex;
  justify-content:center;
  align-items:center;
}

/* VIEWER */

.viewer{

  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
}

/* BOOK */

.book{

  position:relative;

  width:min(92vw,700px);

  height:min(92vh,950px);

  display:flex;
  justify-content:center;
  align-items:center;
}

/* PAGE */

.page{

  position:absolute;

  width:100%;
  height:100%;

  background:white;

  border-radius:24px;

  overflow:hidden;

  box-shadow:
  0 25px 60px rgba(0,0,0,.18);

  transition:
  opacity .35s ease,
  transform .35s ease;

}

/* IMAGE */

.page img{

  width:100%;
  height:100%;

  object-fit:contain;

  background:white;
}

/* TOPBAR */

.topbar{

  position:fixed;

  top:20px;
  left:50%;

  transform:translateX(-50%);

  width:min(92vw,900px);

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:999;
}

/* BRAND */

.brand{

  background:rgba(255,255,255,.75);

  backdrop-filter:blur(20px);

  padding:14px 22px;

  border-radius:999px;

  font-weight:600;

  color:#111;

  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

/* COUNTER */

.counter{

  background:rgba(255,255,255,.75);

  backdrop-filter:blur(20px);

  padding:14px 22px;

  border-radius:999px;

  font-weight:600;

  color:#111;

  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

/* CONTROLS */

.controls{

  position:fixed;

  bottom:30px;
  left:50%;

  transform:translateX(-50%);

  display:flex;
  gap:18px;

  z-index:999;
}

/* BUTTON */

.btn{

  width:62px;
  height:62px;

  border:none;

  border-radius:999px;

  background:white;

  color:#111;

  font-size:18px;

  cursor:pointer;

  transition:.25s ease;

  box-shadow:
  0 10px 30px rgba(0,0,0,.12);
}

/* HOVER */

.btn:hover{

  transform:
  translateY(-4px)
  scale(1.05);

  background:#111;
  color:white;
}

/* HINT */

.hint{

  position:fixed;

  bottom:110px;
  left:50%;

  transform:translateX(-50%);

  background:rgba(255,255,255,.7);

  backdrop-filter:blur(20px);

  padding:12px 20px;

  border-radius:999px;

  color:#555;

  font-size:14px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

/* MOBILE */

@media(max-width:768px){

  .book{

    width:100vw;
    height:100vh;
  }

  .page{
    border-radius:0;
  }

  .topbar{
    width:95%;
  }

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="brand">
Editorial Portfolio
</div>

<div class="counter">
<span id="currentPage">1</span> /
<span id="totalPages">1</span>
</div>

</div>

<!-- VIEWER -->

<div class="viewer">

<div class="book">

<div class="page" id="page">

<img id="pageImage" src="">

</div>

</div>

</div>

<!-- HINT -->

<div class="hint">
Usa ← → o desliza para navegar
</div>

<!-- CONTROLS -->

<div class="controls">

<button class="btn" id="prevBtn">
<i class="fa-solid fa-chevron-left"></i>
</button>

<button class="btn" id="nextBtn">
<i class="fa-solid fa-chevron-right"></i>
</button>

</div>

<script>

/* ======================================
   IMAGENES
====================================== */

const pages = [

"/1.webp",
"/2.webp",
"/3.webp",
"/4.webp",
"/5.webp",
"/6.webp",
"/7.webp",
"/8.webp",
"/9.webp",
"/10.webp",
"/11.webp",
"/12.webp",
"/13.webp",
"/14.webp"

];

/* ======================================
   ELEMENTS
====================================== */

const page = document.getElementById("page");
const pageImage = document.getElementById("pageImage");

const currentText =
document.getElementById("currentPage");

const totalText =
document.getElementById("totalPages");

let current = 0;

totalText.innerText = pages.length;

/* ======================================
   PRELOAD
====================================== */

pages.forEach(src=>{

  const img = new Image();

  img.src = src;

});

/* ======================================
   RENDER
====================================== */

function renderPage(){

  page.style.opacity = ".4";
  page.style.transform = "scale(.98)";

  setTimeout(()=>{

    pageImage.src = pages[current];

    currentText.innerText = current + 1;

    page.style.opacity = "1";
    page.style.transform = "scale(1)";

  },180);

}

/* ======================================
   NEXT
====================================== */

function nextPage(){

  if(current >= pages.length - 1) return;

  current++;

  renderPage();

}

/* ======================================
   PREV
====================================== */

function prevPage(){

  if(current <= 0) return;

  current--;

  renderPage();

}

/* ======================================
   BUTTONS
====================================== */

document.getElementById("nextBtn")
.addEventListener("click",nextPage);

document.getElementById("prevBtn")
.addEventListener("click",prevPage);

/* ======================================
   KEYBOARD
====================================== */

document.addEventListener("keydown",(e)=>{

  if(e.key === "ArrowRight"){
    nextPage();
  }

  if(e.key === "ArrowLeft"){
    prevPage();
  }

});

/* ======================================
   TOUCH
====================================== */

let startX = 0;

document.addEventListener("touchstart",(e)=>{

  startX = e.touches[0].clientX;

});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextPage();
  }

  if(endX - startX > 50){
    prevPage();
  }

});

/* ======================================
   INIT
====================================== */

renderPage();

</script>

</body>
</html>
