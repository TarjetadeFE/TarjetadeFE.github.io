<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Ebook Viewer</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:
  radial-gradient(circle at top right,#312e81 0%,transparent 30%),
  radial-gradient(circle at bottom left,#0f766e 0%,transparent 30%),
  #020617;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* CONTAINER */

.viewer{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* BOOK */

.book{
  position:relative;
  width:min(90vw,1200px);
  height:min(88vh,800px);
  perspective:4000px;
}

/* PAGE */

.page{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  right:0;

  transform-origin:left center;
  transform-style:preserve-3d;

  transition:
  transform 1s cubic-bezier(.65,.05,.36,1);

  border-radius:0 20px 20px 0;
}

/* FLIPPED */

.page.flipped{
  transform:rotateY(-180deg);
}

/* SIDE */

.side{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  overflow:hidden;
  border-radius:0 20px 20px 0;
}

/* FRONT */

.front{
  background:#111827;
  box-shadow:
  inset 0 0 0 1px rgba(255,255,255,.05),
  0 10px 40px rgba(0,0,0,.5);
}

/* BACK */

.back{
  background:#0f172a;
  transform:rotateY(180deg);
}

/* IMAGES */

.side img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LEFT STATIC PAGE */

.static-left{
  position:absolute;
  width:50%;
  height:100%;
  left:0;
  top:0;

  border-radius:20px 0 0 20px;

  overflow:hidden;

  background:#111827;

  box-shadow:
  inset 0 0 0 1px rgba(255,255,255,.05),
  0 10px 40px rgba(0,0,0,.5);
}

.static-left img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CENTER SPINE */

.spine{
  position:absolute;
  left:50%;
  top:0;
  width:8px;
  height:100%;

  transform:translateX(-50%);

  background:
  linear-gradient(
    to right,
    rgba(255,255,255,.08),
    rgba(0,0,0,.4),
    rgba(255,255,255,.08)
  );

  z-index:999;
}

/* CONTROLS */

.controls{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  z-index:9999;
}

.btn{
  width:60px;
  height:60px;
  border-radius:999px;

  background:rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,.1);

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
  background:#7c3aed;
}

/* COUNTER */

.counter{
  position:fixed;
  top:30px;
  right:30px;

  background:rgba(255,255,255,.08);

  border:1px solid rgba(255,255,255,.1);

  backdrop-filter:blur(20px);

  padding:12px 20px;

  border-radius:999px;

  color:white;

  font-weight:600;
}

/* MOBILE */

@media(max-width:900px){

  .book{
    width:100vw;
    height:100vh;
  }

  .page,
  .static-left{
    width:100%;
    border-radius:0;
  }

  .page{
    left:0;
  }

  .side,
  .static-left{
    border-radius:0;
  }

  .spine{
    display:none;
  }

}

</style>
</head>

<body>

<div class="viewer">

<div class="book" id="book">

<div class="static-left" id="leftPage"></div>

<div class="spine"></div>

</div>

</div>

<div class="counter">
<span id="currentPage">1</span> /
<span id="totalPages">1</span>
</div>

<div class="controls">

<div class="btn" id="prevBtn">
◀
</div>

<div class="btn" id="nextBtn">
▶
</div>

</div>

<script>

/* ======================================
   AQUI AGREGAS TUS IMAGENES
====================================== */

const pages = [

"https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1544717305-2782549b5136?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600&auto=format&fit=crop"

];

/* ======================================
   INIT
====================================== */

const book = document.getElementById("book");
const leftPage = document.getElementById("leftPage");

document.getElementById("totalPages").innerText = pages.length;

let current = 0;

/* LEFT PAGE */

leftPage.innerHTML = `
<img src="${pages[0]}">
`;

/* CREATE PAGES */

pages.forEach((img,index)=>{

  if(index === 0) return;

  const page = document.createElement("div");

  page.classList.add("page");

  page.style.zIndex = pages.length - index;

  page.innerHTML = `

  <div class="side front">
    <img src="${img}">
  </div>

  <div class="side back">
    <img src="${img}">
  </div>

  `;

  book.appendChild(page);

});

const allPages = document.querySelectorAll(".page");

/* ======================================
   UPDATE
====================================== */

function updateCounter(){

  document.getElementById("currentPage")
  .innerText = current + 1;

}

/* ======================================
   NEXT
====================================== */

function nextPage(){

  if(current >= allPages.length) return;

  allPages[current].classList.add("flipped");

  current++;

  updateCounter();

}

/* ======================================
   PREV
====================================== */

function prevPage(){

  if(current <= 0) return;

  current--;

  allPages[current].classList.remove("flipped");

  updateCounter();

}

/* ======================================
   BUTTONS
====================================== */

document.getElementById("nextBtn")
.addEventListener("click",nextPage);

document.getElementById("prevBtn")
.addEventListener("click",prevPage);

/* ======================================
   KEYBOARD
====================================== */

document.addEventListener("keydown",(e)=>{

  if(e.key === "ArrowRight"){
    nextPage();
  }

  if(e.key === "ArrowLeft"){
    prevPage();
  }

});

/* ======================================
   TOUCH
====================================== */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextPage();
  }

  if(endX - startX > 50){
    prevPage();
  }

});

updateCounter();

</script>

</body>
</html>
