<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo Editorial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  height:100vh;
  overflow:hidden;
  background:#f4f1ea;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* HEADER */

.header{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:min(92vw,900px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.title{
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(12px);
  padding:12px 18px;
  border-radius:999px;
  font-weight:600;
  color:#111;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.counter{
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(12px);
  padding:12px 18px;
  border-radius:999px;
  font-weight:500;
  color:#111;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* VIEWER */

.viewer{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* BOOK (CATÁLOGO FRAME) */

.book{
  width:min(92vw,650px);
  height:min(92vh,900px);
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.15);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* IMAGE */

.book img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:white;
}

/* FOOTER UX BAR */

.footer{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  align-items:center;
}

/* BUTTONS */

.btn{
  width:52px;
  height:52px;
  border:none;
  border-radius:50%;
  background:white;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  transition:.2s ease;
  color:#111;
}

.btn:hover{
  transform:translateY(-3px);
  background:#111;
  color:white;
}

/* HINT */

.hint{
  position:fixed;
  bottom:95px;
  left:50%;
  transform:translateX(-50%);
  font-size:13px;
  color:#666;
  background:rgba(255,255,255,.7);
  padding:10px 14px;
  border-radius:999px;
  backdrop-filter:blur(10px);
}

/* RESPONSIVE */

@media(max-width:768px){
  .book{
    width:100vw;
    height:100vh;
    border-radius:0;
  }
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="title">Catálogo Editorial</div>

  <div class="counter">
    <span id="current">1</span> /
    <span id="total">1</span>
  </div>

</div>

<!-- VIEWER -->
<div class="viewer">

  <div class="book">
    <img id="img" src="" loading="lazy" decoding="async">
  </div>

</div>

<!-- HINT -->
<div class="hint">← → o desliza para navegar</div>

<!-- CONTROLS -->
<div class="footer">

  <button class="btn" id="prev">
    <i class="fa-solid fa-chevron-left"></i>
  </button>

  <button class="btn" id="next">
    <i class="fa-solid fa-chevron-right"></i>
  </button>

</div>

<script>

/* =========================
   IMÁGENES PNG LOCALES
========================= */

const pages = [
"1.png",
"2.png",
"3.png",
"4.png",
"5.png",
"6.png",
"7.png",
"8.png",
"9.png",
"10.png",
"11.png",
"12.png",
"13.png",
"14.png"
];

/* ========================= */

const img = document.getElementById("img");
const currentText = document.getElementById("current");
const totalText = document.getElementById("total");

let current = 0;

totalText.innerText = pages.length;

/* PRELOAD ligero */
pages.forEach(src=>{
  const i = new Image();
  i.src = src;
});

/* RENDER */
function render(){

  img.style.opacity = "0.5";

  const temp = new Image();
  temp.src = pages[current];

  temp.onload = () => {

    img.src = temp.src;

    currentText.innerText = current + 1;

    requestAnimationFrame(()=>{
      img.style.opacity = "1";
    });

  };

}

/* NEXT */
function next(){
  if(current < pages.length - 1){
    current++;
    render();
  }
}

/* PREV */
function prev(){
  if(current > 0){
    current--;
    render();
  }
}

/* BUTTONS */
document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{
  if(e.key === "ArrowRight") next();
  if(e.key === "ArrowLeft") prev();
});

/* TOUCH */
let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) next();
  if(endX - startX > 50) prev();
});

/* INIT */
render();

</script>

</body>
</html>
