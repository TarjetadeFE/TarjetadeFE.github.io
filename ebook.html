<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editorial Digital Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#f7f3ee,#e9e2d6);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TOP BAR */

.topbar{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:min(92vw,900px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.brand{
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(14px);
  padding:12px 18px;
  border-radius:999px;
  font-weight:600;
  color:#111;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.counter{
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(14px);
  padding:12px 18px;
  border-radius:999px;
  font-weight:500;
  color:#111;
}

/* VIEWER */

.viewer{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* BOOK */

.book{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:all .35s ease;
  max-height:92vh;
}

/* PAGE */

.page{
  width:100%;
  height:100%;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.18);
  transition:opacity .25s ease, transform .25s ease;
}

/* IMAGE */

.page img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:white;
}

/* CONTROLS */

.controls{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:14px;
}

.btn{
  width:56px;
  height:56px;
  border:none;
  border-radius:50%;
  background:white;
  color:#111;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  transition:.25s ease;
}

.btn:hover{
  transform:translateY(-3px);
  background:#111;
  color:white;
}

/* HINT */

.hint{
  position:fixed;
  bottom:95px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(14px);
  padding:10px 16px;
  border-radius:999px;
  font-size:13px;
  color:#555;
}

/* RESPONSIVE */

@media(max-width:768px){
  .book{
    width:100vw;
    height:100vh;
  }

  .page{
    border-radius:0;
  }
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

  <div class="brand">Editorial Viewer</div>

  <div class="counter">
    <span id="current">1</span> /
    <span id="total">1</span>
  </div>

</div>

<!-- VIEWER -->
<div class="viewer">

  <div class="book" id="book">

    <div class="page" id="page">

      <img id="img" loading="lazy" decoding="async">

    </div>

  </div>

</div>

<!-- HINT -->
<div class="hint">← → o desliza para navegar</div>

<!-- CONTROLS -->
<div class="controls">

  <button class="btn" id="prev">
    <i class="fa-solid fa-chevron-left"></i>
  </button>

  <button class="btn" id="next">
    <i class="fa-solid fa-chevron-right"></i>
  </button>

</div>

<script>

/* =========================
   IMÁGENES (RECOMENDADO WEBP)
========================= */

const pages = [

"/1.webp",
"/2.webp",
"/3.webp",
"/4.webp",
"/5.webp",
"/6.webp",
"/7.webp",
"/8.webp",
"/9.webp",
"/10.webp",
"/11.webp",
"/12.webp",
"/13.webp",
"/14.webp"

];

/* =========================
   ELEMENTOS
========================= */

const img = document.getElementById("img");
const page = document.getElementById("page");
const book = document.getElementById("book");

const currentText = document.getElementById("current");
const totalText = document.getElementById("total");

let current = 0;

totalText.innerText = pages.length;

/* =========================
   AJUSTE DINÁMICO
========================= */

function adjustSize(naturalW, naturalH){

  const ratio = naturalW / naturalH;

  if(ratio < 1){
    // vertical (libro, editorial)
    book.style.width = "min(92vw,600px)";
    book.style.aspectRatio = "2 / 3";
  }else{
    // horizontal
    book.style.width = "min(95vw,1100px)";
    book.style.aspectRatio = "16 / 10";
  }

}

/* =========================
   RENDER
========================= */

function render(){

  page.style.opacity = ".4";
  page.style.transform = "scale(.98)";

  const temp = new Image();
  temp.src = pages[current];

  temp.onload = () => {

    adjustSize(temp.naturalWidth, temp.naturalHeight);

    img.src = pages[current];

    currentText.innerText = current + 1;

    setTimeout(() => {
      page.style.opacity = "1";
      page.style.transform = "scale(1)";
    }, 120);

  };

}

/* =========================
   NAVEGACIÓN
========================= */

function next(){
  if(current < pages.length - 1){
    current++;
    render();
  }
}

function prev(){
  if(current > 0){
    current--;
    render();
  }
}

/* =========================
   BOTONES
========================= */

document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

/* =========================
   TECLADO
========================= */

document.addEventListener("keydown",(e)=>{
  if(e.key === "ArrowRight") next();
  if(e.key === "ArrowLeft") prev();
});

/* =========================
   TOUCH
========================= */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) next();
  if(endX - startX > 50) prev();
});

/* =========================
   INIT
========================= */

render();

</script>

</body>
</html>
