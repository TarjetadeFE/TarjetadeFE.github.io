<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Ebook Catalog</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BACKGROUND */

.bg-glow{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:999px;
  filter:blur(120px);
  z-index:-1;
}

.glow1{
  background:#7c3aed;
  top:-200px;
  right:-100px;
  opacity:.3;
}

.glow2{
  background:#06b6d4;
  bottom:-200px;
  left:-100px;
  opacity:.25;
}

/* BOOK */

.book-container{
  width:95%;
  max-width:1200px;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:2500px;
}

/* BOOK */

.book{
  position:relative;
  width:100%;
  max-width:900px;
  height:100%;
}

/* PAGE */

.page{
  position:absolute;
  width:100%;
  height:100%;
  transform-origin:left center;
  transition:transform 1s cubic-bezier(.77,0,.18,1);
  transform-style:preserve-3d;
  cursor:pointer;
}

/* FRONT */

.front,
.back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  overflow:hidden;
  border-radius:20px;
}

/* FRONT */

.front{
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
  0 10px 40px rgba(0,0,0,.5);
}

/* BACK */

.back{
  background:#0f172a;
  transform:rotateY(180deg);
}

/* IMAGE */

.page img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TURN */

.page.flipped{
  transform:rotateY(-180deg);
}

/* UI */

.controls{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  z-index:999;
}

.btn-ui{
  width:60px;
  height:60px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  color:white;
  font-size:22px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:.3s;
}

.btn-ui:hover{
  transform:scale(1.1);
  background:#7c3aed;
}

/* COUNTER */

.counter{
  position:fixed;
  top:30px;
  right:30px;
  color:white;
  background:rgba(255,255,255,.08);
  padding:12px 20px;
  border-radius:999px;
  backdrop-filter:blur(20px);
  font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

  .book-container{
    width:100%;
    height:100vh;
  }

  .book{
    width:100%;
    height:100%;
  }

  .page{
    border-radius:0;
  }

  .front,
  .back{
    border-radius:0;
  }

}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<!-- COUNTER -->
<div class="counter">
  <span id="pageNumber">1</span> /
  <span id="totalPages">1</span>
</div>

<!-- BOOK -->
<div class="book-container">

  <div class="book" id="book"></div>

</div>

<!-- CONTROLS -->
<div class="controls">

  <div class="btn-ui" id="prevBtn">
    ←
  </div>

  <div class="btn-ui" id="nextBtn">
    →
  </div>

</div>

<script>

/* ==========================================
   AQUI COLOCAS TUS IMAGENES
========================================== */

const pages = [

  "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1600&auto=format&fit=crop",

  "https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=1600&auto=format&fit=crop",

  "https://images.unsplash.com/photo-1544717305-2782549b5136?q=80&w=1600&auto=format&fit=crop",

  "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop",

  "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600&auto=format&fit=crop"

];

/* ==========================================
   GENERAR PAGINAS
========================================== */

const book = document.getElementById("book");

pages.forEach((img, index)=>{

  const page = document.createElement("div");
  page.classList.add("page");

  page.style.zIndex = pages.length - index;

  page.innerHTML = `

    <div class="front">
      <img src="${img}">
    </div>

    <div class="back">
      <img src="${img}">
    </div>

  `;

  book.appendChild(page);

});

/* ==========================================
   LOGICA
========================================== */

const allPages = document.querySelectorAll(".page");

let current = 0;

document.getElementById("totalPages").innerText = pages.length;

function updateCounter(){
  document.getElementById("pageNumber").innerText =
  Math.min(current + 1, pages.length);
}

/* NEXT */

function nextPage(){

  if(current >= allPages.length) return;

  allPages[current].classList.add("flipped");

  current++;

  updateCounter();

}

/* PREV */

function prevPage(){

  if(current <= 0) return;

  current--;

  allPages[current].classList.remove("flipped");

  updateCounter();

}

/* BUTTONS */

document.getElementById("nextBtn")
.addEventListener("click", nextPage);

document.getElementById("prevBtn")
.addEventListener("click", prevPage);

/* CLICK PAGE */

allPages.forEach((page, index)=>{

  page.addEventListener("click", ()=>{

    if(index === current){
      nextPage();
    }

  });

});

/* TOUCH MOBILE */

let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{

  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextPage();
  }

  if(endX - startX > 50){
    prevPage();
  }

});

/* KEYBOARD */

document.addEventListener("keydown", e=>{

  if(e.key === "ArrowRight"){
    nextPage();
  }

  if(e.key === "ArrowLeft"){
    prevPage();
  }

});

updateCounter();

</script>

</body>
</html>
