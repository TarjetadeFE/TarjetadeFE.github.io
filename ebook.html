<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editorial Portfolio Viewer</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  width:100%;
  height:100vh;

 :0;

  overflow:hidden;

  background:
  radial-gradient(circle at top,#f5f1ea 0%,#e7e0d4 35%,#d8d1c7 100%);

  display:flex;
  justify-content:center;
  align-items:center;
}

/* CONTAINER */

.viewer{

  width:100%;
  height:100vh;

 :relative;

  display:flex;
  justify-content:center;
  align-items:center;

 :20px;

}

/* BOOK */

.book{

  position:relative;

  width:min(92vw,1100px);

  aspect-ratio:16/10;

  display:flex;
  justify-content:center;
  align-items:center;

}

/* PAGE */

.page{

  position:absolute;

  width:48%;
  height:92%;

 :18px;

  overflow:hidden;

  background:white;

  box-shadow:
  0 20px 50px rgba(0,0,0,.15);

  transition:
  transform .55s cubic-bezier(.22,.61,.36,1),
  opacity .4s ease;

  will-change:transform;

}

/* LEFT */

.page.left{
  left:0;
}

/* RIGHT */

.page.right{
  right:0;
}

/* IMG */

.page img{

  width:100%;
  height:100%;

 -fit:contain;

  background:#fff;
}

/* CENTER SHADOW */

.spine{

  position:absolute;

  width:2px;
  height:90%;

 :#000;

  opacity:.08;

  left:50%;

 :translateX(-50%);
}

/* CONTROLS */

.controls{

  position:fixed;

 :30px;

  left:50%;

  transform:translateX(-50%);

  display:flex;
  gap:18px;

 -index:999;
}

/* BUTTON */

.btn{

  width:58px;
  height:58px;

  border:none;

  border-radius:999px;

  background:white;

  color:#111;

  font-size:18px;

  cursor:pointer;

  transition:.25s ease;

 -shadow:
  0 10px 25px rgba(0,0,0,.12);
}

.btn:hover{

  transform:translateY(-3px);

  background:#111;

  color:white;
}

/* TOPBAR */

.topbar{

  position:fixed;

 :24px;
  left:50%;

  transform:translateX(-50%);

  width:min(92vw,1100px);

  display:flex;
  justify-content:space-between;
  align-items:center;

-index:999;
}

/* TITLE */

.brand{

  background:rgba(255,255,255,.7);

  backdrop-filter:blur(20px);

  padding:12px 22px;

  border-radius:999px;

  color:#111;

  font-weight:600;

  letter-spacing:.5px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

/* COUNTER */

.counter{

  background:rgba(255,255,255,.7);

  backdrop-filter:blur(20px);

  padding:12px 22px;

  border-radius:999px;

  font-weight:600;

  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

/* MOBILE */

@media(max-width:900px){

  .book{

    width:100vw;
    height:100vh;

    aspect-ratio:auto;
  }

  .page{

    width:100%;
    height:100%;

   -radius:0;
  }

  .page.left{
    display:none;
  }

  .page.right{
    width:100%;
  }

  .spine{
    display:none;
  }

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="brand">
Editorial Portfolio
</div>

<div class="counter">
<span id="current">1</span> /
<span id="total">1</span>
</div>

</div>

<!-- VIEWER -->

<div class="viewer">

<div class="book">

<div class="page left" id="leftPage"></div>

<div class="spine"></div>

<div class="page right" id="rightPage"></div>

</div>

</div>

<!-- CONTROLS -->

<div class="controls">

<button class="btn" id="prevBtn">
<i class="fa-solid fa-chevron-left"></i>
</button>

<button class="btn" id="nextBtn">
<i class="fa-solid fa-chevron-right"></i>
</button>

</div>

<script>

/* ======================================
   IMAGENES
====================================== */

const pages = [

"/1.webp",
"/2.webp",
"/3.webp",
"/4.webp",
"/5.webp",
"/6.webp",
"/7.webp",
"/8.webp",
"/9.webp",
"/10.webp",
"/11.webp",
"/12.webp",
"/13.webp",
"/14.webp"

];

/* ======================================
   ELEMENTS
====================================== */

const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

const currentText = document.getElementById("current");
const totalText = document.getElementById("total");

let current = 0;

totalText.innerText = pages.length;

/* ======================================
   RENDER
====================================== */

function renderPages(){

  /* LEFT */

  if(window.innerWidth > 900){

    leftPage.innerHTML = pages[current]
    ? `<img loading="lazy" src="${pages[current]}">`
    : "";

    rightPage.innerHTML = pages[current + 1]
    ? `<img loading="lazy" src="${pages[current + 1]}">`
    : "";

  }else{

    rightPage.innerHTML = pages[current]
    ? `<img loading="lazy" src="${pages[current]}">`
    : "";

  }

  currentText.innerText = current + 1;

}

/* ======================================
   NEXT
====================================== */

function nextPage(){

  if(window.innerWidth > 900){

    if(current < pages.length - 2){

      current += 2;

      animatePage();

    }

  }else{

    if(current < pages.length - 1){

      current++;

      animatePage();

    }

  }

}

/* ======================================
   PREV
====================================== */

function prevPage(){

  if(window.innerWidth > 900){

    if(current > 0){

      current -= 2;

      animatePage();

    }

  }else{

    if(current > 0){

      current--;

      animatePage();

    }

  }

}

/* ======================================
   ANIMATION
====================================== */

function animatePage(){

  rightPage.style.transform = "scale(.96)";
  rightPage.style.opacity = ".5";

  setTimeout(()=>{

    renderPages();

    rightPage.style.transform = "scale(1)";
    rightPage.style.opacity = "1";

  },220);

}

/* ======================================
   BUTTONS
====================================== */

document.getElementById("nextBtn")
.addEventListener("click",nextPage);

document.getElementById("prevBtn")
.addEventListener("click",prevPage);

/* ======================================
   KEYBOARD
====================================== */

document.addEventListener("keydown",(e)=>{

  if(e.key === "ArrowRight"){
    nextPage();
  }

  if(e.key === "ArrowLeft"){
    prevPage();
  }

});

/* ======================================
   TOUCH
====================================== */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextPage();
  }

  if(endX - startX > 50){
    prevPage();
  }

});

/* ======================================
   RESIZE
====================================== */

window.addEventListener("resize",renderPages);

/* ======================================
   INIT
====================================== */

renderPages();

</script>

</body>
</html>
