<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon Ebook Viewer</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;

  background:
  radial-gradient(circle at top right,#ff00c8 0%,transparent 30%),
  radial-gradient(circle at bottom left,#00f0ff 0%,transparent 30%),
  radial-gradient(circle at center,#7928ca 0%,transparent 45%),
  #030712;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* AMBIENT LIGHT */

.light{
  position:absolute;
  width:450px;
  height:450px;
  border-radius:999px;
  filter:blur(140px);
  z-index:-1;
  opacity:.4;
}

.light1{
  background:#ff00c8;
  top:-150px;
  right:-100px;
}

.light2{
  background:#00f0ff;
  bottom:-150px;
  left:-100px;
}

/* VIEWER */

.viewer{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* BOOK */

.book{
  position:relative;

  width:min(92vw,1250px);
  height:min(88vh,850px);

  perspective:5000px;
}

/* STATIC LEFT */

.static-left{
  position:absolute;

  width:50%;
  height:100%;

  left:0;
  top:0;

  overflow:hidden;

  border-radius:28px 0 0 28px;

  background:#0f172a;

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 0 60px rgba(255,0,200,.15),
  0 20px 60px rgba(0,0,0,.6);
}

.static-left img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PAGE */

.page{
  position:absolute;

  width:50%;
  height:100%;

  right:0;
  top:0;

  transform-origin:left center;

  transform-style:preserve-3d;

  transition:
  transform 1s cubic-bezier(.77,0,.18,1);

  border-radius:0 28px 28px 0;
}

/* FLIPPED */

.page.flipped{
  transform:rotateY(-180deg);
}

/* SIDE */

.side{
  position:absolute;

  width:100%;
  height:100%;

  overflow:hidden;

  backface-visibility:hidden;

  border-radius:0 28px 28px 0;
}

/* FRONT */

.front{

  background:#111827;

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 0 50px rgba(0,240,255,.12),
  0 20px 60px rgba(0,0,0,.6);

}

/* BACK */

.back{
  background:#111827;
  transform:rotateY(180deg);
}

/* IMG */

.side img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SPINE */

.spine{
  position:absolute;

  left:50%;
  top:0;

  transform:translateX(-50%);

  width:10px;
  height:100%;

  background:
  linear-gradient(
    to right,
    rgba(255,255,255,.15),
    rgba(0,0,0,.5),
    rgba(255,255,255,.15)
  );

  z-index:999;
}

/* TOPBAR */

.topbar{
  position:fixed;

  top:20px;
  left:50%;

  transform:translateX(-50%);

  width:min(92vw,1250px);

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:99999;
}

/* LOGO */

.logo{
  color:white;
  font-size:24px;
  font-weight:700;

  padding:14px 24px;

  border-radius:999px;

  background:rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 0 30px rgba(255,0,200,.15);
}

.logo span{
  color:#00f0ff;
}

/* COUNTER */

.counter{
  color:white;

  padding:14px 24px;

  border-radius:999px;

  background:rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,.08);

  font-weight:600;

  box-shadow:
  0 0 30px rgba(0,240,255,.15);
}

/* CONTROLS */

.controls{
  position:fixed;

  bottom:30px;
  left:50%;

  transform:translateX(-50%);

  display:flex;
  align-items:center;
  gap:20px;

  z-index:999999;
}

/* BUTTON */

.btn-ui{

  width:72px;
  height:72px;

  border-radius:999px;

  border:none;

  color:white;

  font-size:24px;

  cursor:pointer;

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    rgba(255,0,200,.9),
    rgba(0,240,255,.9)
  );

  box-shadow:
  0 0 20px rgba(255,0,200,.35),
  0 0 40px rgba(0,240,255,.25);

  transition:.3s;
}

/* HOVER */

.btn-ui:hover{

  transform:
  translateY(-6px)
  scale(1.08);

  box-shadow:
  0 0 30px rgba(255,0,200,.6),
  0 0 60px rgba(0,240,255,.4);

}

/* ACTIVE */

.btn-ui:active{
  transform:scale(.95);
}

/* BUTTON GLOW */

.btn-ui::before{

  content:"";

  position:absolute;

  width:120px;
  height:120px;

  background:rgba(255,255,255,.2);

  border-radius:999px;

  top:-20px;
  left:-90px;

  transition:.5s;
}

.btn-ui:hover::before{
  left:90px;
}

/* PAGE HINT */

.hint{

  position:fixed;

  bottom:120px;
  left:50%;

  transform:translateX(-50%);

  color:white;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  padding:12px 24px;

  border-radius:999px;

  font-size:14px;

  opacity:.75;
}

/* MOBILE */

@media(max-width:900px){

  .book{
    width:100vw;
    height:100vh;
  }

  .page,
  .static-left{
    width:100%;
    border-radius:0;
  }

  .side{
    border-radius:0;
  }

  .spine{
    display:none;
  }

  .topbar{
    width:95%;
  }

  .btn-ui{
    width:64px;
    height:64px;
  }

}

</style>
</head>

<body>

<div class="light light1"></div>
<div class="light light2"></div>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
NEON<span>BOOK</span>
</div>

<div class="counter">
<span id="currentPage">1</span> /
<span id="totalPages">1</span>
</div>

</div>

<!-- VIEWER -->

<div class="viewer">

<div class="book" id="book">

<div class="static-left" id="leftPage"></div>

<div class="spine"></div>

</div>

</div>

<!-- HINT -->

<div class="hint">
Usa ← → o desliza para cambiar página
</div>

<!-- CONTROLS -->

<div class="controls">

<button class="btn-ui" id="prevBtn">
<i class="fa-solid fa-arrow-left"></i>
</button>

<button class="btn-ui" id="nextBtn">
<i class="fa-solid fa-arrow-right"></i>
</button>

</div>

<script>

/* ===================================
   IMAGENES DEL CATALOGO
=================================== */

const pages = [

"https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1544717305-2782549b5136?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop",

"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600&auto=format&fit=crop"

];

/* ===================================
   INIT
=================================== */

const book = document.getElementById("book");
const leftPage = document.getElementById("leftPage");

document.getElementById("totalPages").innerText = pages.length;

let current = 0;

/* LEFT PAGE */

leftPage.innerHTML = `
<img src="${pages[0]}">
`;

/* CREATE PAGES */

pages.forEach((img,index)=>{

  if(index === 0) return;

  const page = document.createElement("div");

  page.classList.add("page");

  page.style.zIndex = pages.length - index;

  page.innerHTML = `

  <div class="side front">
    <img src="${img}">
  </div>

  <div class="side back">
    <img src="${img}">
  </div>

  `;

  book.appendChild(page);

});

const allPages = document.querySelectorAll(".page");

/* ===================================
   COUNTER
=================================== */

function updateCounter(){

  document.getElementById("currentPage")
  .innerText = current + 1;

}

/* ===================================
   NEXT
=================================== */

function nextPage(){

  if(current >= allPages.length) return;

  allPages[current].classList.add("flipped");

  current++;

  updateCounter();

}

/* ===================================
   PREV
=================================== */

function prevPage(){

  if(current <= 0) return;

  current--;

  allPages[current].classList.remove("flipped");

  updateCounter();

}

/* ===================================
   BUTTONS
=================================== */

document.getElementById("nextBtn")
.addEventListener("click",nextPage);

document.getElementById("prevBtn")
.addEventListener("click",prevPage);

/* ===================================
   KEYBOARD
=================================== */

document.addEventListener("keydown",(e)=>{

  if(e.key === "ArrowRight"){
    nextPage();
  }

  if(e.key === "ArrowLeft"){
    prevPage();
  }

});

/* ===================================
   TOUCH
=================================== */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextPage();
  }

  if(endX - startX > 50){
    prevPage();
  }

});

updateCounter();

</script>

</body>
</html>
