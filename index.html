<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {

  min-height: 180px;
  font-size: 16px;
  line-height: 1.6;
  padding: 14px;
}
    
    
    #cita-overlay {
  padding: 0 12px;
  box-sizing: border-box;
}
    
    
#cita-overlay {
  max-height: 90%;
  overflow: visible;
  padding: 0 12px;
  box-sizing: border-box;
  line-height: 1.3;
}


@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }

<body class="flex flex-col items-center min-h-screen p-4">

<!-- TOP -->
<div id="topbar">

<button id="installBtn" style="

<!-- BOTÓN -->


  <button id="whatsapp-btn" class="btn w-48"
style="
  background:#25D366;
  color:white;
  font-weight:bold;
  border-radius:10px;
  display:inline-flex;
  align-items:center;
  justify-content:center;

</button>

<div style="margin-top:15px; text-align:center;">
  <button id="descarga-btn" class="btn btn-primary w-48">
    Crear y descargar
  </button>

  
<br>
  <br>

</div>


<p style="
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #7a5c00;
  margin: 0;
  background: #fff;
  padding: 5px 0;
  animation: fadeOut 30s forwards;
">
📱 iPhone: Abrir en Safari → Compartir → “Añadir a pantalla de inicio”
</p>
  
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const versiculos = [
  { ref: "Jeremías 29,11", text: "Porque yo sé los planes que tengo para vosotros." },
  { ref: "Salmo 23,1", text: "El Señor es mi pastor, nada me falta." },
  { ref: "Filipenses 4,13", text: "Todo lo puedo en aquel que me fortalece." },
  { ref: "Juan 14,6", text: "Yo soy el camino, la verdad y la vida." }
];

const lista = document.getElementById("lista-versiculos");
const overlay = document.getElementById("cita-overlay");
const textarea = document.getElementById("mi-reflexion");

// 🔥 SOLO UNA FUENTE DE VERDAD: textarea
function actualizar() {
  overlay.textContent = textarea.value || "Escribe o selecciona un versículo";
}

// Versículos (REEMPLAZAN, no acumulan caos)
versiculos.forEach(v => {
  const btn = document.createElement("button");
  btn.className = "versiculo-btn";
  btn.innerHTML = `<strong>${v.text}</strong><br><small>${v.ref}</small>`;

  btn.onclick = () => {
    textarea.value = textarea.value.trim()
  ? `${textarea.value}\n\n${v.text}\n${v.ref}`
  : `${v.text}\n${v.ref}`;
    actualizar();
  };

  lista.appendChild(btn);
});

// escritura libre
textarea.addEventListener("input", actualizar);

// descarga
document.getElementById("descarga-btn").addEventListener("click", () => {
  html2canvas(document.getElementById("tarjeta-container")).then(canvas => {
    const link = document.createElement("a");
    
    let count = parseInt(localStorage.getItem("count") || "0") + 1;
localStorage.setItem("count", count);

link.download = `tarjeta-biblica-${count}.png`;
    
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
});

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js")
    .then(() => console.log("Service Worker activo"))
    .catch(err => console.log("Error SW:", err));
}
</script>

<script>
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

// Detecta si se puede instalar (Android / Chrome)
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

// Click instalar
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  deferredPrompt = null;
  installBtn.style.display = "none";
});
</script>

<script>
document.getElementById("whatsapp-btn").addEventListener("click", async () => {
  const tarjeta = document.getElementById("tarjeta-container");

  try {
    const canvas = await html2canvas(tarjeta, {
      scale: 2,
      useCORS: true
    });

    const image = canvas.toDataURL("image/png");

    const res = await fetch(image);
    const blob = await res.blob();
    const file = new File([blob], "tarjeta-fe.png", { type: "image/png" });

    const texto = "Hoy aprendí esto en la homilía 🙏 \n ¿Qué aprendiste tú?";

    // 📲 Web Share API (mejor opción)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          title: "Tarjeta de Fe",
          text: texto,
          files: [file]
        });
        return;
      } catch (err) {
        console.log("Compartir cancelado");
      }
    }

    // 🔁 fallback WhatsApp texto
    const msg = encodeURIComponent(texto);
    window.open(`https://wa.me/?text=${msg}`, "_blank");

  } catch (error) {
    console.error(error);
    alert("No se pudo compartir la imagen");
  }
});
</script>


<script>

    },
        "3": {

    },
        "4": {
      imagen: "tarjeta4.png",
      color: "#2E8B57",
      fuente: "'Georgia', serif"
    },
        "5": {
      imagen: "tarjeta5.png",
      color: "#2E8B57",

    },
        "6": {
      imagen: "tarjeta6.png",

  };

  if (card && tarjetas[card]) {
    const t = tarjetas[card];

    // 🎯 imagen
    img.src = t.imagen + "?v=" + Date.now();

  //  overlay.style.color = t.color;
  

    // ✨ versículo sorpresa
    const texto = randomVersiculo();

  <script>
document.addEventListener("DOMContentLoaded", () => {
  const img = document.querySelector("#tarjeta-container img");

  // 👇 ajusta aquí la transparencia

  <script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("tarjeta-container");
  const overlay = document.getElementById("cita-overlay");

  if (!container || !overlay) return;

  // 🟤 CREAR FONDO TRANSLÚCIDO (si no existe)
  let bg = document.getElementById("text-bg");

  if (!bg) {
    bg = document.createElement("div");
    bg.id = "text-bg";
    container.appendChild(bg);
  }

  // 📦 CONTENEDOR BASE
  container.style.position = "relative";

  // 🟤 FONDO TRANSLÚCIDO (solo detrás del texto)
  Object.assign(bg.style, {
    position: "absolute",
    inset: "0",
    background: "rgba(0,0,0,0.35)",
    zIndex: "1",
    pointerEvents: "none"
  });

  // ✍️ TEXTO CENTRADO Y RESPONSIVE
  Object.assign(overlay.style, {
    position: "absolute",
    top: "50%",
    left: "50%",
    transform: "translate(-50%, -50%)",
    width: "85%",
    maxHeight: "80%",

    display: "flex",
    alignItems: "center",
    justifyContent: "center",

    textAlign: "center",
    whiteSpace: "pre-line",
    wordBreak: "break-word",
    overflowWrap: "break-word",

    zIndex: "2",
    color: "#fff",
    fontFamily: "'Playfair Display', serif",
    lineHeight: "1.4",

    padding: "10px"
  });

  // 📱 AJUSTE PARA MÓVILES
  function adjustMobile() {
    if (window.innerWidth < 500) {
      overlay.style.fontSize = "1.2rem";
    } else {
      overlay.style.fontSize = "1.6rem";
    }
  }

  adjustMobile();
  window.addEventListener("resize", adjustMobile);

});
</script>

<script>

      );
    };

    contenedor.appendChild(wrapper);
  });

  document.body.appendChild(contenedor);

});
</script>
