<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diseña y comparte tu tarjeta bíblica</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to bottom, #fffef5, #fff8e1);
      font-family: 'Roboto', sans-serif;
    }

    h1 {
      font-family: 'Playfair Display', serif;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 55px;
      background: rgba(255, 248, 225, 0.95);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    #home-btn {
      font-size: 1.4rem;
      color: #5a3d00;
      text-decoration: none;
    }

    #tarjeta-container {
      position: relative;
      display: inline-block;
      max-width: 90%;
      margin: 80px auto 20px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    #cita-overlay {
      position: absolute;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: #DAA520;
      text-align: center;
      width: 90%;
      white-space: pre-line;
      word-break: break-word;
    }

    .versiculo-btn {
      background: linear-gradient(to bottom, #fffef5, #fff8e1);
      border: 2px solid #d4af37;
      color: #5a3d00;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-bottom: 8px;
    }

    #lista-versiculos {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
    }

    #reflexion-box {
      max-width: 850px;
      margin: 10px auto;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #d4af37;
      resize: none;
      outline: none;
      font-family: 'Roboto', sans-serif;
    }
  </style>
</head>

<body class="flex flex-col items-center min-h-screen p-4">

<!-- TOP -->
<div id="topbar">
  <div style="font-weight:600;color:#5a3d00;">Tarjetas Bíblicas</div>
  <a id="home-btn" href="https://palabradelpadre.github.io">
    <i class="bi bi-house-fill"></i>
  </a>
</div>

<!-- TITULO -->
<h1 class="text-3xl md:text-5xl font-bold mt-16 text-center text-yellow-700">
  Diseña y comparte tu tarjeta
</h1>

<!-- ✝️ INPUT -->
<div id="reflexion-box">
  <p style="text-align:center;color:#7a5c00;font-weight:600;">
    ✨ Escribe lo que aprendiste en la misa
  </p>

  <textarea id="mi-reflexion" rows="4"
    placeholder="✝️ ¿Qué te dejó la misa de hoy?"></textarea>
</div>

<!-- LISTA -->
<div id="lista-versiculos"></div>

<!-- TARJETA -->
<div id="tarjeta-container">
  <img src="https://palabradelpadre.github.io/pascua3.png" style="width:100%;">
  <div id="cita-overlay">Escribe o selecciona un versículo</div>
</div>

<!-- BOTÓN -->
<div style="margin-top:15px;">
  <button id="descarga-btn" class="btn btn-primary w-48">
    Crear y descargar
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const versiculos = [
  { ref: "Jeremías 29,11", text: "Porque yo sé los planes que tengo para vosotros." },
  { ref: "Salmo 23,1", text: "El Señor es mi pastor, nada me falta." },
  { ref: "Filipenses 4,13", text: "Todo lo puedo en aquel que me fortalece." },
  { ref: "Juan 14,6", text: "Yo soy el camino, la verdad y la vida." }
];

const lista = document.getElementById("lista-versiculos");
const overlay = document.getElementById("cita-overlay");
const textarea = document.getElementById("mi-reflexion");

// 🔥 SOLO UNA FUENTE DE VERDAD: textarea
function actualizar() {
  overlay.textContent = textarea.value || "Escribe o selecciona un versículo";
}

// Versículos (REEMPLAZAN, no acumulan caos)
versiculos.forEach(v => {
  const btn = document.createElement("button");
  btn.className = "versiculo-btn";
  btn.innerHTML = `<strong>${v.text}</strong><br><small>${v.ref}</small>`;

  btn.onclick = () => {
    textarea.value = textarea.value.trim()
  ? `${textarea.value}\n\n${v.text}\n${v.ref}`
  : `${v.text}\n${v.ref}`;
    actualizar();
  };

  lista.appendChild(btn);
});

// escritura libre
textarea.addEventListener("input", actualizar);

// descarga
document.getElementById("descarga-btn").addEventListener("click", () => {
  html2canvas(document.getElementById("tarjeta-container")).then(canvas => {
    const link = document.createElement("a");
    
    let count = parseInt(localStorage.getItem("count") || "0") + 1;
localStorage.setItem("count", count);

link.download = `tarjeta-biblica-${count}.png`;
    
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
});

</script>

</body>
</html>
